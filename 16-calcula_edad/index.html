<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Edad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="titulo">Calculadora de Edad</h1>
        <div class="form">
            <label for="birthday">Ingrese fecha de nacimiento</label>
            <input type="date" name="birthday" id="birthday">
            <button id="btn">Calcular Edad</button>
            <p id="result"></p>
        </div>
    </div>


    <script src="index.js"></script>
</body>
</html>
