<!DOCTYPE html>
<html lang="en">
<head>

    <title>Countdown to New Year</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Count to New Year</h2>

        <div id="hora">00</div>
        <div id="minuto">00</div>
        <div id="segundo">00</div>
    </div>


    <script src="index.js"></script>
