<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indice de Masa Corporal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="heding">Indice de Masa Corporal (IMC)</h1>
        Tu Altura(cm):
        <input type="number" id="height" value="180" placeholder="Ingresa tu altura en cm" class="input">
        Tu Peso(kg):
        <input type="number" id="Weight" value="80" placeholder="Ingresa tu peso en kg" class="input">
        <button class="btn" id="btn">Calcular IMC</button>
        <input type="text" class="input" id="bmi-result" disabled>
        <h4 class="info-text">Peso Condicion: <span id="weight-condition"></span></h4>
    </div>

    <script src="index.js"></script>
</body>
</html>
